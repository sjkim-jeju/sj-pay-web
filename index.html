<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승재의 고양이 가계부 🐾</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f43f5e">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col relative bg-rose-50">

    <!-- 상단 헤더 -->
    <header class="bg-rose-500 text-white p-4 shadow-md flex justify-between items-center z-10 sticky top-0 rounded-b-xl pt-[env(safe-area-inset-top)]">
        <div class="flex items-center space-x-2">
            <h1 class="text-xl font-bold tracking-tight">승재의 가계부 <i class="fa-solid fa-cat ml-1 text-rose-200"></i></h1>
        </div>
        <button id="refreshBtn" class="p-2 bg-rose-400 rounded-full hover:bg-rose-300 transition">
            <i class="fa-solid fa-trash-can"></i> 전체초기화
        </button>
    </header>

    <!-- 메인 내용 -->
    <main class="flex-1 overflow-y-auto p-4 pb-24">
        <!-- 요약 대시보드 -->
        <section class="bg-white rounded-3xl p-5 shadow-sm mb-4 border-2 border-rose-100">
            <h2 class="text-sm text-gray-500 mb-2 font-medium">이번 달 전체 현황 🐾</h2>
            <div class="flex flex-col space-y-3">
                <div class="flex justify-between items-end border-b border-rose-50 pb-2">
                    <span class="text-gray-600">들어온 돈 🐟</span>
                    <span class="text-blue-500 font-bold text-lg" id="totalIncome">0원</span>
                </div>
                <div class="flex justify-between items-end border-b border-rose-50 pb-2">
                    <span class="text-gray-600">나간 돈 😿</span>
                    <span class="text-rose-500 font-bold text-lg" id="totalExpense">0원</span>
                </div>
                <div class="flex justify-between items-end pt-1">
                    <span class="text-gray-800 font-bold">합계 잔액 😻</span>
                    <span class="text-gray-800 font-bold text-2xl" id="totalBalance">0원</span>
                </div>
            </div>
        </section>

        <!-- 내역 리스트 출력 공간 -->
        <section id="transactionList" class="space-y-4"></section>
    </main>

    <!-- 플러스(+) 플로팅 버튼 -->
    <button id="addBtn" class="fixed bottom-6 right-6 w-14 h-14 bg-rose-500 text-white rounded-full shadow-lg hover:bg-rose-600 flex items-center justify-center text-2xl z-20">
        <i class="fa-solid fa-plus"></i>
    </button>

    <!-- 내역 추가 모달창 -->
    <div id="transactionModal" class="fixed inset-0 bg-rose-900 bg-opacity-40 backdrop-blur-sm z-50 hidden flex-col justify-end">
        <div class="bg-white w-full rounded-t-[32px] shadow-2xl p-6 border-t-4 border-rose-400 relative max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gray-800">새 내역 츄르가기 🐾</h3>
                <button id="closeModalBtn" class="text-gray-400 p-2 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <form id="transactionForm" class="space-y-4">
                <!-- 🌟 AI 자동 입력 영역 🌟 -->
                <div class="bg-rose-50 p-4 rounded-2xl border border-rose-100 relative overflow-hidden">
                    <span class="text-sm font-bold text-rose-600 mb-2 block"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 자동 입력냥!</span>
                    <div class="flex space-x-2">
                        <label class="flex-1 bg-white border-2 border-rose-200 text-rose-500 py-3 rounded-xl font-bold cursor-pointer text-center text-xs shadow-sm flex flex-col items-center">
                            <i class="fa-solid fa-camera text-xl mb-1"></i> 영수증 사진
                            <input type="file" id="receiptImage" accept="image/*" class="hidden">
                        </label>
                        <button type="button" id="pasteTextBtn" class="flex-1 bg-white border-2 border-rose-200 text-rose-500 py-3 rounded-xl font-bold text-center text-xs shadow-sm flex flex-col items-center">
                            <i class="fa-solid fa-comment-sms text-xl mb-1"></i> 문자/텍스트
                        </button>
                    </div>
                    <div id="aiLoading" class="hidden absolute inset-0 bg-white bg-opacity-90 flex flex-col items-center justify-center z-10 rounded-2xl">
                        <i class="fa-solid fa-cat fa-bounce text-3xl text-rose-500 mb-2"></i>
                        <span class="text-sm font-bold text-rose-500">영수증 읽는 중... 🐾</span>
                    </div>
                </div>

                <!-- 수동 입력 영역 -->
                <div class="flex p-1.5 bg-rose-50 rounded-2xl">
                    <label class="flex-1 text-center py-2 cursor-pointer font-bold"><input type="radio" name="type" value="expense" checked class="mr-1">나간 돈 😿</label>
                    <label class="flex-1 text-center py-2 cursor-pointer font-bold"><input type="radio" name="type" value="income" class="mr-1">들어온 돈 😻</label>
                </div>

                <input type="date" id="dateInput" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none">
                <select id="cardInput" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none appearance-none">
                    <option value="check">💜 체크카드</option>
                    <option value="credit">💖 신용카드</option>
                    <option value="tamna">🍊 탐나는전</option>
                    <option value="cash">💵 현금</option>
                </select>
                <input type="number" id="amountInput" placeholder="얼마냥? (숫자만)" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none font-bold">
                <input type="text" id="descInput" placeholder="어디다 썼냥?" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none">
                
                <button type="submit" class="w-full bg-rose-500 text-white font-bold py-4 rounded-2xl shadow-md mt-2">저장할게옹 🐾</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승재의 가계부 🐾</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/q3sPSCvs/1.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f43f5e">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col relative bg-rose-50">

    <!-- AI 로딩 화면 (전체화면 덮기) -->
    <div id="aiLoading" class="hidden fixed inset-0 bg-white bg-opacity-80 backdrop-blur-sm flex flex-col items-center justify-center z-[100]">
        <img src="https://i.ibb.co/VpcCQRK6/123.png" alt="Loading" class="w-24 h-24 object-contain animate-bounce mb-4 drop-shadow-xl">
        <span class="text-lg font-bold text-rose-500 bg-white px-4 py-2 rounded-full shadow-sm">영수증 읽는 중이다 냥... 🐾</span>
    </div>

    <!-- 상단 헤더 -->
    <header class="bg-rose-500 text-white p-4 shadow-md flex justify-between items-center z-10 sticky top-0 rounded-b-xl pt-[env(safe-area-inset-top)]">
        <div class="flex items-center space-x-2">
            <img src="https://i.ibb.co/q3sPSCvs/1.png" alt="Profile" class="w-10 h-10 rounded-full border-2 border-rose-300 bg-white object-cover">
            <h1 class="text-xl font-bold tracking-tight">승재의 가계부</h1>
        </div>
        <button id="refreshBtn" class="p-2 bg-rose-400 rounded-full hover:bg-rose-300 transition">
            <i class="fa-solid fa-rotate-right"></i> 새로고침
        </button>
    </header>

    <!-- 상단 탭 메뉴 (챕터별 보기) -->
    <nav class="bg-white shadow-sm sticky top-[72px] z-10 rounded-b-2xl mx-2 mb-2">
        <ul id="tabList" class="flex overflow-x-auto no-scrollbar whitespace-nowrap p-3 text-sm font-medium">
            <li class="mr-2"><button data-tab="all" class="tab-btn px-4 py-2 rounded-full bg-rose-100 text-rose-700 font-bold transition">전체 내역</button></li>
            <li class="mr-2"><button data-tab="check" class="tab-btn px-4 py-2 rounded-full text-gray-500 hover:bg-rose-50 transition">체크카드</button></li>
            <li class="mr-2"><button data-tab="credit" class="tab-btn px-4 py-2 rounded-full text-gray-500 hover:bg-rose-50 transition">신용카드</button></li>
            <li class="mr-2"><button data-tab="tamna" class="tab-btn px-4 py-2 rounded-full text-gray-500 hover:bg-rose-50 transition">탐나는전</button></li>
            <li class="mr-2"><button data-tab="cash" class="tab-btn px-4 py-2 rounded-full text-gray-500 hover:bg-rose-50 transition">현금 <i class="fa-solid fa-coins ml-1"></i></button></li>
            <li class="mr-2"><button data-tab="other" class="tab-btn px-4 py-2 rounded-full text-gray-500 hover:bg-rose-50 transition">기타 🎁</button></li>
        </ul>
    </nav>

    <!-- 메인 내용 (합계) -->
    <main class="flex-1 overflow-y-auto p-4 pb-24">
        <section class="bg-white rounded-3xl p-5 shadow-sm mb-4 border-2 border-rose-100">
            <h2 class="text-sm text-gray-500 mb-2 font-medium" id="summaryTitle">전체 내역 현황 🐾</h2>
            <div class="flex flex-col space-y-3">
                <div class="flex justify-between items-end border-b border-rose-50 pb-2">
                    <span class="text-gray-600">들어온 돈 🐟</span>
                    <span class="text-blue-500 font-bold text-lg" id="totalIncome">0원</span>
                </div>
                <div class="flex justify-between items-end border-b border-rose-50 pb-2">
                    <span class="text-gray-600">나간 돈 😿</span>
                    <span class="text-rose-500 font-bold text-lg" id="totalExpense">0원</span>
                </div>
                <div class="flex justify-between items-end pt-1">
                    <span class="text-gray-800 font-bold">합계 잔액 😻</span>
                    <span class="text-gray-800 font-bold text-2xl" id="totalBalance">0원</span>
                </div>
            </div>
        </section>

        <!-- 내역 리스트 -->
        <section id="transactionList" class="space-y-4"></section>
    </main>

    <!-- 동그라미 플러스 버튼 & 확장 메뉴 -->
    <div class="fixed bottom-6 right-6 z-40 flex flex-col items-end space-y-3">
        <div id="fabMenu" class="hidden flex-col items-end space-y-3 mb-2 transition-all duration-300 origin-bottom scale-0 opacity-0">
            
            <!-- AI 등록용 결제수단 강제 지정 박스 -->
            <div class="flex items-center space-x-2 bg-white px-4 py-2 rounded-full shadow-lg border border-rose-200">
                <span class="text-sm font-bold text-gray-600">결제수단 픽! 👉</span>
                <select id="aiCardSelect" class="bg-rose-50 text-rose-600 font-bold rounded-xl px-2 py-1 outline-none text-sm">
                    <option value="check">💜 체크카드</option>
                    <option value="credit">💖 신용카드</option>
                    <option value="tamna">🍊 탐나는전</option>
                    <option value="cash">💵 현금</option>
                </select>
            </div>

            <!-- 문자 분석 버튼 -->
            <button type="button" id="pasteTextBtn" class="flex items-center space-x-2 bg-white px-4 py-2 rounded-full shadow-lg border border-rose-100 text-rose-500 hover:bg-rose-50 transition">
                <span class="text-sm font-bold">문자 붙여넣기</span>
                <div class="w-10 h-10 bg-rose-100 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-comment-sms"></i></div>
            </button>

            <!-- 사진 분석 버튼 -->
            <label class="flex items-center space-x-2 bg-white px-4 py-2 rounded-full shadow-lg border border-rose-100 text-rose-500 hover:bg-rose-50 transition cursor-pointer">
                <span class="text-sm font-bold">사진 분석하기</span>
                <div class="w-10 h-10 bg-rose-100 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-camera"></i></div>
                <input type="file" id="receiptImage" accept="image/*" class="hidden">
            </label>

            <!-- 수동 입력 버튼 -->
            <button type="button" id="manualAddBtn" class="flex items-center space-x-2 bg-white px-4 py-2 rounded-full shadow-lg border border-rose-100 text-gray-600 hover:bg-gray-50 transition">
                <span class="text-sm font-bold">직접 수동 입력</span>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-pen"></i></div>
            </button>
            
        </div>

        <!-- 메인 동그라미 버튼 -->
        <button id="mainFabBtn" class="w-14 h-14 bg-rose-500 text-white rounded-full shadow-lg hover:bg-rose-600 flex items-center justify-center text-2xl transition-transform duration-300">
            <i class="fa-solid fa-plus transition-transform duration-300" id="fabIcon"></i>
        </button>
    </div>

    <!-- 수동 추가 모달창 -->
    <div id="transactionModal" class="fixed inset-0 bg-rose-900 bg-opacity-40 backdrop-blur-sm z-50 hidden flex-col justify-end">
        <div class="w-full relative mt-10">
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 w-24 h-24 bg-white rounded-full border-4 border-rose-400 overflow-hidden shadow-lg z-50">
                <img src="https://i.ibb.co/1fDDZHKT/4.jpg" alt="Peeking Cat" class="w-full h-full object-cover">
            </div>
            <div class="bg-white w-full rounded-t-[32px] shadow-2xl p-6 pt-14 border-t-4 border-rose-400 max-h-[85vh] overflow-y-auto relative">
                <div class="flex justify-between items-center mb-5">
                    <h3 class="text-xl font-bold text-gray-800">수동으로 츄르가기 🐾</h3>
                    <button id="closeModalBtn" class="text-gray-400 p-2 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <form id="transactionForm" class="space-y-4">
                    <div class="flex p-1.5 bg-rose-50 rounded-2xl">
                        <label class="flex-1 text-center py-2 cursor-pointer font-bold"><input type="radio" name="type" value="expense" checked class="mr-1">나간 돈 😿</label>
                        <label class="flex-1 text-center py-2 cursor-pointer font-bold"><input type="radio" name="type" value="income" class="mr-1">들어온 돈 😻</label>
                    </div>
                    <input type="date" id="dateInput" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none font-medium">
                    <select id="cardInput" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none appearance-none font-medium">
                        <option value="check">💜 체크카드</option>
                        <option value="credit">💖 신용카드</option>
                        <option value="tamna">🍊 탐나는전</option>
                        <option value="cash">💵 현금</option>
                        <option value="other">🎁 기타</option>
                    </select>
                    <input type="number" id="amountInput" placeholder="얼마냥? (숫자만)" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none font-bold text-lg">
                    <input type="text" id="descInput" placeholder="어디다 썼냥?" required class="w-full px-4 py-3 bg-rose-50 rounded-2xl outline-none font-medium">
                    <button type="submit" class="w-full bg-rose-500 text-white font-bold py-4 rounded-2xl shadow-md mt-2">저장할게옹 🐾</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
